<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: transparent;
    }

    /* ── Floating bubble ── */
    #chat-bubble {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,115,232,0.45);
      z-index: 999;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
    }
    #chat-bubble:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(26,115,232,0.55); }
    #chat-bubble svg { width: 26px; height: 26px; fill: #fff; }

    .bubble-badge {
      position: absolute;
      top: -2px; right: -2px;
      width: 14px; height: 14px;
      background: #69f0ae;
      border-radius: 50%;
      border: 2px solid #fff;
      animation: pulse 2s infinite;
    }
    .bubble-badge.offline { background: #f28b82; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Chat panel ── */
    #chat-panel {
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 380px;
      height: 560px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 998;
      transform: scale(0.85) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transform-origin: bottom right;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
    }
    #chat-panel.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    @media (max-width: 440px) {
      #chat-panel {
        width: calc(100vw - 16px);
        right: 8px;
        bottom: 84px;
        height: 70vh;
      }
      #chat-bubble { bottom: 16px; right: 16px; }
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .header-text h1 {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      line-height: 1.2;
    }
    .header-text p {
      color: rgba(255,255,255,0.75);
      font-size: 11px;
      margin-top: 1px;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: #69f0ae;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }
    .status-dot.offline { background: #f28b82; animation: none; }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sources-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      user-select: none;
    }
    .toggle-track {
      width: 28px; height: 15px;
      background: rgba(255,255,255,0.3);
      border-radius: 8px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-track.on { background: #69f0ae; }
    .toggle-thumb {
      width: 11px; height: 11px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 15px; }

    .icon-btn {
      width: 28px; height: 28px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── Settings modal ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 24px 20px;
      width: min(400px, 90vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h2 { font-size: 15px; font-weight: 600; color: #202124; margin-bottom: 16px; }
    .modal label { display: block; font-size: 11px; font-weight: 600; color: #5f6368; margin-bottom: 4px; margin-top: 12px; }
    .modal label:first-of-type { margin-top: 0; }
    .modal input {
      width: 100%; padding: 8px 10px;
      border: 1.5px solid #dadce0; border-radius: 8px;
      font-size: 13px; font-family: inherit; color: #202124;
      outline: none; transition: border-color 0.15s;
    }
    .modal input:focus { border-color: #1a73e8; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .btn-save {
      padding: 8px 18px; background: #1a73e8; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #1557b0; }
    .btn-cancel {
      padding: 8px 14px; background: transparent; color: #5f6368;
      border: 1.5px solid #dadce0; border-radius: 8px; font-size: 13px;
      cursor: pointer;
    }
    .btn-cancel:hover { border-color: #9aa0a6; }

    /* ── Setup banner ── */
    .setup-banner {
      display: none;
      background: #fef7e0;
      border-bottom: 1px solid #f9c440;
      padding: 8px 14px;
      font-size: 12px;
      color: #7a5f00;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .setup-banner.show { display: flex; }
    .setup-banner a { color: #1a73e8; cursor: pointer; font-weight: 600; text-decoration: none; }

    /* ── Messages ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px 14px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .bot .avatar  { background: #e8f0fe; }
    .user .avatar { background: #e3f2fd; }

    .bubble {
      max-width: 78%;
      padding: 8px 12px;
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bot .bubble {
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }
    .bot .bubble.error { background: #fce8e6; color: #c5221f; }

    .bot .bubble p     { margin: 0 0 6px; }
    .bot .bubble p:last-child { margin-bottom: 0; }
    .bot .bubble strong { font-weight: 600; }
    .bot .bubble em    { font-style: italic; }
    .bot .bubble code  { background: #e8eaed; padding: 1px 4px; border-radius: 3px; font-size: 12px; font-family: 'Consolas', monospace; }
    .bot .bubble pre   { background: #e8eaed; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 4px 0; }
    .bot .bubble pre code { background: none; padding: 0; }
    .bot .bubble ul, .bot .bubble ol { padding-left: 16px; margin: 3px 0; }
    .bot .bubble li    { margin: 2px 0; }

    .sources {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #e0e0e0;
      font-size: 11px;
      color: #5f6368;
    }
    .sources-label { font-weight: 600; margin-right: 3px; }

    .typing-indicator {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 12px;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      background: #9aa0a6;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-5px); }
    }

    .ts {
      font-size: 10px;
      color: #9aa0a6;
      padding: 0 34px;
      margin-bottom: 4px;
      text-align: right;
    }
    .ts.bot-ts { text-align: left; }

    /* ── Input ── */
    .input-area {
      padding: 10px 12px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: #f1f3f4;
      border-radius: 22px;
      padding: 5px 5px 5px 14px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: #1a73e8; background: #fff; }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.5;
      color: #202124;
      outline: none;
      max-height: 100px;
      min-height: 20px;
      overflow-y: auto;
      padding: 3px 0;
    }
    textarea::placeholder { color: #9aa0a6; }

    #btn {
      width: 32px; height: 32px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #btn:hover:not(:disabled) { background: #1557b0; transform: scale(1.05); }
    #btn:disabled { background: #dadce0; cursor: not-allowed; }
    #btn svg { width: 15px; height: 15px; }

    .hint {
      text-align: center;
      font-size: 10px;
      color: #b0b8c1;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <!-- Floating bubble -->
  <button id="chat-bubble" title="Ask Angel">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
    <span class="bubble-badge" id="bubbleBadge"></span>
  </button>

  <!-- Chat panel -->
  <div id="chat-panel">
    <div class="header">
      <div class="header-icon">📚</div>
      <div class="header-text">
        <h1>Angel</h1>
        <p><span class="status-dot" id="statusDot"></span><span id="statusText">Connected to EOX knowledge base</span></p>
      </div>
      <div class="header-actions">
        <div class="sources-toggle" id="sourcesToggle" title="Show/hide sources">
          <span>Sources</span>
          <div class="toggle-track on" id="toggleTrack"><div class="toggle-thumb"></div></div>
        </div>
        <button class="icon-btn" id="settingsBtn" title="Configure API keys">⚙</button>
        <button class="icon-btn" id="closeBtn" title="Close">✕</button>
      </div>
    </div>

    <div class="setup-banner" id="setupBanner">
      ⚠️ Keys not configured. <a id="setupLink">Set them up</a> first.
    </div>

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask a question…"></textarea>
        <button id="btn" title="Send">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="hint">Enter to send · Shift+Enter for new line</p>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2>⚙️ API Configuration</h2>
      <label for="cfgGroq">Groq API Key</label>
      <input type="password" id="cfgGroq" placeholder="gsk_...">
      <label for="cfgPinecone">Pinecone API Key</label>
      <input type="password" id="cfgPinecone" placeholder="pcsk_...">
      <label for="cfgHost">Pinecone Index Host</label>
      <input type="text" id="cfgHost" placeholder="https://your-index-xxxx.svc.pinecone.io">
      <div class="modal-footer">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-save" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'eox_angel_cfg';
    const TOP_K = 10;
    const EMBED_MODEL = 'llama-text-embed-v2';

    const input     = document.getElementById('input');
    const btn       = document.getElementById('btn');
    const chat      = document.getElementById('chat');
    const panel     = document.getElementById('chat-panel');
    const bubble    = document.getElementById('chat-bubble');
    const history   = [];
    let showSources = true;
    let panelOpen   = false;

    // --- Panel toggle ---
    bubble.addEventListener('click', function() {
      panelOpen = !panelOpen;
      panel.classList.toggle('open', panelOpen);
      if (panelOpen && keysReady()) input.focus();
    });
    document.getElementById('closeBtn').addEventListener('click', function() {
      panelOpen = false;
      panel.classList.remove('open');
    });

    // --- Config ---
    function loadCfg() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
    }
    function saveCfg(cfg) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    }
    function keysReady() {
      const c = loadCfg();
      return c.groqKey && c.pineconeKey && c.pineconeHost;
    }

    // --- Settings modal ---
    document.getElementById('settingsBtn').addEventListener('click', openModal);
    document.getElementById('setupLink').addEventListener('click', openModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalBackdrop').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('modalSave').addEventListener('click', function() {
      const cfg = {
        groqKey:      document.getElementById('cfgGroq').value.trim(),
        pineconeKey:  document.getElementById('cfgPinecone').value.trim(),
        pineconeHost: document.getElementById('cfgHost').value.trim().replace(/\/$/, '')
      };
      if (!cfg.groqKey || !cfg.pineconeKey || !cfg.pineconeHost) {
        alert('Please fill in all three fields.');
        return;
      }
      saveCfg(cfg);
      closeModal();
      checkKeys();
    });

    function openModal() {
      const cfg = loadCfg();
      document.getElementById('cfgGroq').value     = cfg.groqKey || '';
      document.getElementById('cfgPinecone').value = cfg.pineconeKey || '';
      document.getElementById('cfgHost').value     = cfg.pineconeHost || '';
      document.getElementById('modalBackdrop').classList.add('open');
    }
    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
    }

    function checkKeys() {
      const ok = keysReady();
      document.getElementById('setupBanner').classList.toggle('show', !ok);
      document.getElementById('statusDot').className = 'status-dot' + (ok ? '' : ' offline');
      document.getElementById('bubbleBadge').className = 'bubble-badge' + (ok ? '' : ' offline');
      document.getElementById('statusText').textContent = ok ? 'Connected to EOX knowledge base' : 'Not configured';
      btn.disabled = !ok;
    }

    // --- Sources toggle ---
    document.getElementById('sourcesToggle').addEventListener('click', function() {
      showSources = !showSources;
      document.getElementById('toggleTrack').classList.toggle('on', showSources);
    });

    // --- Init ---
    window.addEventListener('load', function() {
      checkKeys();
      addMessage('bot', "Hi! I am Angel, your EOX AI Assistant. How can I help you today?");
      if (!keysReady()) {
        panelOpen = true;
        panel.classList.add('open');
        openModal();
      }
    });

    // --- Textarea auto-grow ---
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    btn.addEventListener('click', send);

    // --- Send ---
    async function send() {
      const msg = input.value.trim();
      if (!msg || btn.disabled) return;

      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;

      addMessage('user', msg);
      const thinkingBubble = addTyping();

      try {
        const { answer, sources } = await getReply(msg, history);
        thinkingBubble.parentElement.remove();
        addMessage('bot', answer, false, sources);
        history.push({ role: 'user', content: msg });
        history.push({ role: 'assistant', content: answer });
        if (history.length > 20) history.splice(0, 2);
      } catch(err) {
        thinkingBubble.parentElement.remove();
        addMessage('bot', 'Sorry, something went wrong: ' + err.message, true);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // --- Core logic ---
    async function getReply(message, history) {
      const cfg = loadCfg();

      if (/^\s*(hi|hello|hey|howdy|good\s*(morning|afternoon|evening)|greetings|sup)[!?.]*\s*$/i.test(message)) {
        return { answer: "Hi! I'm Angel, your EOX AI Assistant. How can I help you today?", sources: [] };
      }

      const embedRes = await fetch('https://api.pinecone.io/embed', {
        method: 'POST',
        headers: { 'Api-Key': cfg.pineconeKey, 'Content-Type': 'application/json', 'X-Pinecone-API-Version': '2024-10' },
        body: JSON.stringify({ model: EMBED_MODEL, inputs: [{ text: message }], parameters: { input_type: 'query', truncate: 'END' } })
      });
      if (!embedRes.ok) throw new Error('Embed failed (' + embedRes.status + '): ' + await embedRes.text());
      const queryVec = (await embedRes.json()).data[0].values;

      const qRes = await fetch(cfg.pineconeHost + '/query', {
        method: 'POST',
        headers: { 'Api-Key': cfg.pineconeKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({ vector: queryVec, topK: TOP_K, includeMetadata: true })
      });
      if (!qRes.ok) throw new Error('Pinecone query failed (' + qRes.status + '): ' + await qRes.text());
      const { matches } = await qRes.json();

      if (!matches || matches.length === 0)
        return { answer: "I don't have information about that in the available documents.", sources: [] };

      const context = matches.map(m => `--- ${m.metadata.source} ---\n${m.metadata.text}`).join('\n\n');

      const groqRes = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + cfg.groqKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: "You are Angel, the EOX AI assistant. Answer ONLY from the provided document excerpts. Never use general training knowledge. If the answer is not in the documents, say: \"I don't have information about that in the available documents.\"" },
            ...(history || []),
            { role: 'user', content: 'Documents:\n\n' + context + '\n\nQuestion: ' + message }
          ]
        })
      });
      if (!groqRes.ok) throw new Error('Groq failed (' + groqRes.status + '): ' + await groqRes.text());
      const answer = (await groqRes.json()).choices[0].message.content;

      const noDocAnswer = /cannot\b.{0,15}\bfound|not (found|mentioned|available|provided|contained|stated|specified|present)|can't find|don't have|no information|not in the (documents?|provided|excerpts?)|outside (the|my)|unable to (find|locate|provide)/i.test(answer);
      const sources = [];
      if (!noDocAnswer) {
        const seen = new Set();
        for (const m of matches) {
          const src = m.metadata.source;
          if (src && !seen.has(src)) { seen.add(src); sources.push({ name: src }); }
        }
      }
      return { answer, sources };
    }

    // --- UI helpers ---
    function addMessage(role, text, isError, sources) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '🧑' : '🧠';

      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (isError ? ' error' : '');

      if (role === 'bot' && !isError) bubble.innerHTML = markdownToHtml(text);
      else bubble.textContent = text;

      if (showSources && sources && sources.length) {
        const refs = document.createElement('div');
        refs.className = 'sources';
        refs.innerHTML = '<span class="sources-label">Sources:</span> ' + sources.map(s => escapeHtml(s.name)).join(' · ');
        bubble.appendChild(refs);
      }

      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);

      const ts = document.createElement('div');
      ts.className = 'ts' + (role === 'bot' ? ' bot-ts' : '');
      ts.textContent = now();
      chat.appendChild(ts);

      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🧠';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function markdownToHtml(text) {
      const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return escaped
        .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)$/, '<p>$1</p>');
    }
  </script>
</body>
