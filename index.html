<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      min-height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

    .card {
      background: #fff;
      border-radius: 0;
      box-shadow: none;
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    @media (min-width: 720px) {
      body {
        align-items: center;
        padding: 24px;
        background: #f0f2f5;
      }
      .card {
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        max-width: 680px;
        height: min(92vh, 720px);
      }
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .sources-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .toggle-track {
      width: 34px; height: 18px;
      background: rgba(255,255,255,0.3);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-track.on { background: #69f0ae; }
    .toggle-thumb {
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 18px; }
    .header-icon {
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-text h1 {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
    }
    .header-text p {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      margin-top: 2px;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #69f0ae;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    .status-dot.offline { background: #f28b82; animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Settings icon */
    .settings-btn {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: rgba(255,255,255,0.85);
      font-size: 16px;
      transition: background 0.15s;
    }
    .settings-btn:hover { background: rgba(255,255,255,0.25); }

    /* Settings modal */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      width: min(480px, 90vw);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h2 { font-size: 16px; font-weight: 600; color: #202124; margin-bottom: 18px; }
    .modal label { display: block; font-size: 12px; font-weight: 600; color: #5f6368; margin-bottom: 4px; margin-top: 14px; }
    .modal label:first-of-type { margin-top: 0; }
    .modal input {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid #dadce0; border-radius: 8px;
      font-size: 13px; font-family: inherit; color: #202124;
      outline: none; transition: border-color 0.15s;
    }
    .modal input:focus { border-color: #1a73e8; }
    .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-save {
      padding: 9px 20px; background: #1a73e8; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-save:hover { background: #1557b0; }
    .btn-cancel {
      padding: 9px 16px; background: transparent; color: #5f6368;
      border: 1.5px solid #dadce0; border-radius: 8px; font-size: 13px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .btn-cancel:hover { border-color: #9aa0a6; }

    /* Banner when keys missing */
    .setup-banner {
      display: none;
      background: #fef7e0;
      border-bottom: 1px solid #f9c440;
      padding: 10px 20px;
      font-size: 13px;
      color: #7a5f00;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .setup-banner.show { display: flex; }
    .setup-banner a { color: #1a73e8; cursor: pointer; font-weight: 600; text-decoration: none; }

    /* Messages area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .bot .avatar  { background: #e8f0fe; }
    .user .avatar { background: #e3f2fd; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bot .bubble {
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }
    .bot .bubble.error { background: #fce8e6; color: #c5221f; }

    .bot .bubble p     { margin: 0 0 8px; }
    .bot .bubble p:last-child { margin-bottom: 0; }
    .bot .bubble strong { font-weight: 600; }
    .bot .bubble em    { font-style: italic; }
    .bot .bubble code  { background: #e8eaed; padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: 'Consolas', monospace; }
    .bot .bubble pre   { background: #e8eaed; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; }
    .bot .bubble pre code { background: none; padding: 0; }
    .bot .bubble ul, .bot .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bot .bubble li    { margin: 2px 0; }

    .sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #5f6368;
    }
    .sources-label { font-weight: 600; margin-right: 4px; }

    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: #9aa0a6;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    .ts {
      font-size: 11px;
      color: #9aa0a6;
      padding: 0 40px;
      margin-bottom: 6px;
      text-align: right;
    }
    .ts.bot-ts { text-align: left; }

    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #f1f3f4;
      border-radius: 26px;
      padding: 6px 6px 6px 16px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: #1a73e8; background: #fff; }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      color: #202124;
      outline: none;
      max-height: 120px;
      min-height: 22px;
      overflow-y: auto;
      padding: 4px 0;
    }
    textarea::placeholder { color: #9aa0a6; }

    #btn {
      width: 38px; height: 38px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #btn:hover:not(:disabled) { background: #1557b0; transform: scale(1.05); }
    #btn:disabled { background: #dadce0; cursor: not-allowed; transform: none; }
    #btn svg { width: 18px; height: 18px; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #9aa0a6;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-icon">📚</div>
      <div class="header-text">
        <h1>Angel</h1>
        <p><span class="status-dot" id="statusDot"></span><span id="statusText">Connected to EOX knowledge base</span></p>
      </div>
      <div class="sources-toggle" id="sourcesToggle" title="Show/hide sources">
        <span>Sources</span>
        <div class="toggle-track on" id="toggleTrack">
          <div class="toggle-thumb"></div>
        </div>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Configure API keys">⚙</button>
    </div>

    <div class="setup-banner" id="setupBanner">
      ⚠️ API keys not configured. <a id="setupLink">Click here to set them up</a> before chatting.
    </div>

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask a question…"></textarea>
        <button id="btn" title="Send">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2>⚙️ API Configuration</h2>
      <label for="cfgGroq">Groq API Key</label>
      <input type="password" id="cfgGroq" placeholder="gsk_...">
      <label for="cfgPinecone">Pinecone API Key</label>
      <input type="password" id="cfgPinecone" placeholder="pcsk_...">
      <label for="cfgHost">Pinecone Index Host</label>
      <input type="text" id="cfgHost" placeholder="https://your-index-xxxx.svc.pinecone.io">
      <div class="modal-footer">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-save" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'eox_angel_cfg';
    const TOP_K = 5;
    const EMBED_MODEL = 'llama-text-embed-v2';

    const input   = document.getElementById('input');
    const btn     = document.getElementById('btn');
    const chat    = document.getElementById('chat');
    const history = [];
    let showSources = true;

    // --- Config (stored in localStorage) ---
    function loadCfg() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
    }
    function saveCfg(cfg) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    }
    function keysReady() {
      const c = loadCfg();
      return c.groqKey && c.pineconeKey && c.pineconeHost;
    }

    // --- Settings modal ---
    document.getElementById('settingsBtn').addEventListener('click', openModal);
    document.getElementById('setupLink').addEventListener('click', openModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    document.getElementById('modalBackdrop').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.getElementById('modalSave').addEventListener('click', function() {
      const cfg = {
        groqKey:      document.getElementById('cfgGroq').value.trim(),
        pineconeKey:  document.getElementById('cfgPinecone').value.trim(),
        pineconeHost: document.getElementById('cfgHost').value.trim().replace(/\/$/, '')
      };
      if (!cfg.groqKey || !cfg.pineconeKey || !cfg.pineconeHost) {
        alert('Please fill in all three fields.');
        return;
      }
      saveCfg(cfg);
      closeModal();
      checkKeys();
    });

    function openModal() {
      const cfg = loadCfg();
      document.getElementById('cfgGroq').value      = cfg.groqKey || '';
      document.getElementById('cfgPinecone').value  = cfg.pineconeKey || '';
      document.getElementById('cfgHost').value      = cfg.pineconeHost || '';
      document.getElementById('modalBackdrop').classList.add('open');
    }
    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('open');
    }

    function checkKeys() {
      const ok = keysReady();
      document.getElementById('setupBanner').classList.toggle('show', !ok);
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      dot.className = 'status-dot' + (ok ? '' : ' offline');
      txt.textContent = ok ? 'Connected to EOX knowledge base' : 'Not configured';
      btn.disabled = !ok;
    }

    // --- Sources toggle ---
    document.getElementById('sourcesToggle').addEventListener('click', function() {
      showSources = !showSources;
      document.getElementById('toggleTrack').classList.toggle('on', showSources);
    });

    // --- Init ---
    window.addEventListener('load', function() {
      checkKeys();
      addMessage('bot', "Hi! I am Angel, your EOX AI Assistant. How can I help you today?");
      if (keysReady()) input.focus();
      else openModal();
    });

    // --- Textarea auto-grow ---
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    btn.addEventListener('click', send);

    // --- Send ---
    async function send() {
      const msg = input.value.trim();
      if (!msg || btn.disabled) return;

      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;

      addMessage('user', msg);
      const thinkingBubble = addTyping();

      try {
        const { answer, sources } = await getReply(msg, history);
        thinkingBubble.parentElement.remove();
        addMessage('bot', answer, false, sources);
        history.push({ role: 'user', content: msg });
        history.push({ role: 'assistant', content: answer });
        if (history.length > 20) history.splice(0, 2);
      } catch(err) {
        thinkingBubble.parentElement.remove();
        addMessage('bot', 'Sorry, something went wrong: ' + err.message, true);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // --- Core logic ---
    async function getReply(message, history) {
      const cfg = loadCfg();

      if (/^\s*(hi|hello|hey|howdy|good\s*(morning|afternoon|evening)|greetings|sup)[!?.]*\s*$/i.test(message)) {
        return { answer: "Hi! I'm Angel, your EOX AI Assistant. How can I help you today?", sources: [] };
      }

      // 1. Embed the query
      const embedRes = await fetch('https://api.pinecone.io/embed', {
        method: 'POST',
        headers: {
          'Api-Key': cfg.pineconeKey,
          'Content-Type': 'application/json',
          'X-Pinecone-API-Version': '2024-10'
        },
        body: JSON.stringify({
          model: EMBED_MODEL,
          inputs: [{ text: message }],
          parameters: { input_type: 'query', truncate: 'END' }
        })
      });
      if (!embedRes.ok) {
        const t = await embedRes.text();
        throw new Error('Embed failed (' + embedRes.status + '): ' + t);
      }
      const embedData = await embedRes.json();
      const queryVec = embedData.data[0].values;

      // 2. Query Pinecone
      const qRes = await fetch(cfg.pineconeHost + '/query', {
        method: 'POST',
        headers: {
          'Api-Key': cfg.pineconeKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ vector: queryVec, topK: TOP_K, includeMetadata: true })
      });
      if (!qRes.ok) {
        const t = await qRes.text();
        throw new Error('Pinecone query failed (' + qRes.status + '): ' + t);
      }
      const { matches } = await qRes.json();

      if (!matches || matches.length === 0) {
        return { answer: "I don't have information about that in the available documents.", sources: [] };
      }

      const context = matches.map(m => `--- ${m.metadata.source} ---\n${m.metadata.text}`).join('\n\n');

      // 3. Call Groq
      const groqRes = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + cfg.groqKey,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: "You are Angel, the EOX AI assistant. Answer ONLY from the provided document excerpts. Never use general training knowledge. If the answer is not in the documents, say: \"I don't have information about that in the available documents.\"" },
            ...(history || []),
            { role: 'user', content: 'Documents:\n\n' + context + '\n\nQuestion: ' + message }
          ]
        })
      });
      if (!groqRes.ok) {
        const t = await groqRes.text();
        throw new Error('Groq failed (' + groqRes.status + '): ' + t);
      }
      const groqData = await groqRes.json();
      const answer = groqData.choices[0].message.content;

      // 4. Build sources (name only, no external links)
      const noDocAnswer = /cannot\b.{0,15}\bfound|not (found|mentioned|available|provided|contained|stated|specified|present)|can't find|don't have|no information|not in the (documents?|provided|excerpts?)|outside (the|my)|unable to (find|locate|provide)/i.test(answer);
      const sources = [];
      if (!noDocAnswer) {
        const seen = new Set();
        for (const m of matches) {
          const src = m.metadata.source;
          if (src && !seen.has(src)) {
            seen.add(src);
            sources.push({ name: src });
          }
        }
      }
      return { answer, sources };
    }

    // --- UI helpers ---
    function addMessage(role, text, isError, sources) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '🧑' : '🧠';

      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (isError ? ' error' : '');

      if (role === 'bot' && !isError) {
        bubble.innerHTML = markdownToHtml(text);
      } else {
        bubble.textContent = text;
      }

      if (showSources && sources && sources.length) {
        const refs = document.createElement('div');
        refs.className = 'sources';
        refs.innerHTML = '<span class="sources-label">Sources:</span> ' +
          sources.map(s => escapeHtml(s.name)).join(' · ');
        bubble.appendChild(refs);
      }

      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);

      const ts = document.createElement('div');
      ts.className = 'ts' + (role === 'bot' ? ' bot-ts' : '');
      ts.textContent = now();
      chat.appendChild(ts);

      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🧠';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function markdownToHtml(text) {
      const escaped = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return escaped
        .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)$/, '<p>$1</p>');
    }
  </script>
</body>
</html>
