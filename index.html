<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      min-height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }

    .card {
      background: #fff;
      border-radius: 0;
      box-shadow: none;
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    /* When loaded standalone (not in iframe), show as centered card */
    @media (min-width: 720px) {
      body {
        align-items: center;
        padding: 24px;
        background: #f0f2f5;
      }
      .card {
        border-radius: 16px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        max-width: 680px;
        height: min(92vh, 720px);
      }
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .sources-toggle {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }
    .toggle-track {
      width: 34px; height: 18px;
      background: rgba(255,255,255,0.3);
      border-radius: 9px;
      position: relative;
      transition: background 0.2s;
    }
    .toggle-track.on { background: #69f0ae; }
    .toggle-thumb {
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: left 0.2s;
    }
    .toggle-track.on .toggle-thumb { left: 18px; }
    .header-icon {
      width: 42px; height: 42px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-text h1 {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      line-height: 1.2;
    }
    .header-text p {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      margin-top: 2px;
    }
    .status-dot {
      width: 8px; height: 8px;
      background: #69f0ae;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* Messages area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    .bot .avatar  { background: #e8f0fe; }
    .user .avatar { background: #e3f2fd; }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .user .bubble {
      background: #1a73e8;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .bot .bubble {
      background: #f1f3f4;
      color: #202124;
      border-bottom-left-radius: 4px;
    }
    .bot .bubble.error { background: #fce8e6; color: #c5221f; }

    /* Markdown in bot bubbles */
    .bot .bubble p     { margin: 0 0 8px; }
    .bot .bubble p:last-child { margin-bottom: 0; }
    .bot .bubble strong { font-weight: 600; }
    .bot .bubble em    { font-style: italic; }
    .bot .bubble code  { background: #e8eaed; padding: 1px 5px; border-radius: 4px; font-size: 13px; font-family: 'Consolas', monospace; }
    .bot .bubble pre   { background: #e8eaed; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; }
    .bot .bubble pre code { background: none; padding: 0; }
    .bot .bubble ul, .bot .bubble ol { padding-left: 18px; margin: 4px 0; }
    .bot .bubble li    { margin: 2px 0; }

    /* Source references */
    .sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #e0e0e0;
      font-size: 12px;
      color: #5f6368;
    }
    .sources-label { font-weight: 600; margin-right: 4px; }
    .sources a {
      color: #1a73e8;
      text-decoration: none;
    }
    .sources a:hover { text-decoration: underline; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: #9aa0a6;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-6px); }
    }

    /* Timestamp */
    .ts {
      font-size: 11px;
      color: #9aa0a6;
      padding: 0 40px;
      margin-bottom: 6px;
      text-align: right;
    }
    .ts.bot-ts { text-align: left; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 32px 24px;
      color: #5f6368;
    }
    .welcome .icon { font-size: 40px; margin-bottom: 10px; }
    .welcome h3    { font-size: 16px; font-weight: 600; color: #3c4043; margin-bottom: 6px; }
    .welcome p     { font-size: 13px; line-height: 1.5; }

    /* Input row */
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: #f1f3f4;
      border-radius: 26px;
      padding: 6px 6px 6px 16px;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: #1a73e8; background: #fff; }

    textarea {
      flex: 1;
      border: none;
      background: transparent;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      color: #202124;
      outline: none;
      max-height: 120px;
      min-height: 22px;
      overflow-y: auto;
      padding: 4px 0;
    }
    textarea::placeholder { color: #9aa0a6; }

    #btn {
      width: 38px; height: 38px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #btn:hover:not(:disabled) { background: #1557b0; transform: scale(1.05); }
    #btn:disabled { background: #dadce0; cursor: not-allowed; transform: none; }
    #btn svg { width: 18px; height: 18px; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #9aa0a6;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="header-icon">📚</div>
      <div class="header-text">
        <h1>Angel</h1>
        <p><span class="status-dot"></span>Connected to EOX knowledge base</p>
      </div>
      <div class="sources-toggle" id="sourcesToggle" title="Show/hide sources">
        <span>Sources</span>
        <div class="toggle-track on" id="toggleTrack">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </div>

    <div id="chat"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Ask a question…"></textarea>
        <button id="btn" title="Send">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const btn   = document.getElementById('btn');
    const chat  = document.getElementById('chat');
    const history = [];
    let showSources = true;

    document.getElementById('sourcesToggle').addEventListener('click', function() {
      showSources = !showSources;
      document.getElementById('toggleTrack').classList.toggle('on', showSources);
    });

    // Auto intro on load
    window.addEventListener('load', function() {
      addMessage('bot', "Hi! I am Angel, your EOX AI Assistant. How can I help you today?");
      input.focus();
    });

    // Auto-grow textarea
    input.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    btn.addEventListener('click', send);

    function send() {
      const msg = input.value.trim();
      if (!msg || btn.disabled) return;

      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;

      addMessage('user', msg);
      const thinkingBubble = addTyping();

      google.script.run
        .withSuccessHandler(function(reply) {
          thinkingBubble.parentElement.remove();
          let answer = reply;
          let sources = [];
          try {
            const data = JSON.parse(reply);
            answer = data.answer;
            sources = data.sources || [];
          } catch(e) {}
          addMessage('bot', answer, false, sources);
          history.push({ role: 'user', content: msg });
          history.push({ role: 'assistant', content: answer });
          if (history.length > 20) history.splice(0, 2); // keep last 10 exchanges
          btn.disabled = false;
          input.focus();
        })
        .withFailureHandler(function(err) {
          thinkingBubble.parentElement.remove();
          addMessage('bot', 'Sorry, something went wrong: ' + err.message, true);
          btn.disabled = false;
          input.focus();
        })
        .getReply(msg, history);
    }

    function addMessage(role, text, isError, sources) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + role;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '🧑' : '🧠';

      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (isError ? ' error' : '');

      if (role === 'bot' && !isError) {
        bubble.innerHTML = markdownToHtml(text);
      } else {
        bubble.textContent = text;
      }

      // Source references
      if (showSources && sources && sources.length) {
        const refs = document.createElement('div');
        refs.className = 'sources';
        refs.innerHTML = '<span class="sources-label">Sources:</span> ' +
          sources.map(s => `<a href="${s.url}" target="_blank" rel="noopener">${s.name}</a>`).join(' · ');
        bubble.appendChild(refs);
      }

      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);

      // Timestamp
      const ts = document.createElement('div');
      ts.className = 'ts' + (role === 'bot' ? ' bot-ts' : '');
      ts.textContent = now();
      chat.appendChild(ts);

      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = '🧠';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

      row.appendChild(avatar);
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Minimal Markdown → HTML (bold, italic, inline code, code blocks, lists)
    function markdownToHtml(text) {
      const escaped = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      return escaped
        // fenced code blocks
        .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        // inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // italic
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // unordered lists
        .replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        // ordered lists
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        // line breaks → paragraphs
        .replace(/\n\n+/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^(.+)$/, '<p>$1</p>');
    }
  </script>
</body>
</html>
